<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="shortcut icon"
      href="assets/images/logo.svg"
      type="image/x-icon"
    />
    <title>Task Day 5 - B66 - Stage 1</title>
  </head>
  <body>
    <header class="sticky-top">
      <nav class="navbar navbar-expand-lg bg-custom-white">
        <div class="container d-flex justify-content-between">
          <!-- Logo -->
          <a class="navbar-brand fw-bolder" href="index.html">MH</a>

          <!-- Toggle (mobile) -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Menu -->
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav small gap-2">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contact.html">Contact</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="projects.html">Projects</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section
        id="contact"
        class="bg-custom-primary d-flex flex-column justify-content-center align-items-center py-5 gap-4"
      >
        <h1 class="fw-bold">Contact Me</h1>
        <form class="card border-0 shadow-sm rounded-4 p-4 w-25">
          <!-- Name -->
          <div class="mb-3">
            <label for="inputName" class="form-label">Name</label>
            <input
              type="text"
              class="form-control"
              id="inputName"
              placeholder="John Doe..."
            />
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="inputEmail" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="inputEmail"
              placeholder="example@mail.com"
            />
          </div>

          <!-- Message -->
          <div class="mb-4">
            <label class="form-label">Message</label>
            <textarea
              class="form-control rounded-3"
              rows="4"
              placeholder="Write your message..."
            ></textarea>
          </div>

          <!-- Buttons -->
          <div class="d-flex gap-3">
            <a class="btn btn-outline-dark rounded-pill w-50" href="index.html">
              Back
            </a>
            <button type="submit" class="btn btn-dark rounded-pill w-100">
              Submit
            </button>
          </div>
        </form>
      </section>
    </main>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
