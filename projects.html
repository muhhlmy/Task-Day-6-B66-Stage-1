<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="shortcut icon"
      href="assets/images/logo.svg"
      type="image/x-icon"
    />
    <title>Task Day 5 - B66 - Stage 1</title>
  </head>
  <body>
    <header class="sticky-top">
      <nav class="navbar navbar-expand-lg bg-custom-white">
        <div class="container d-flex justify-content-between">
          <!-- Logo -->
          <a class="navbar-brand fw-bolder" href="index.html">MH</a>

          <!-- Toggle (mobile) -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Menu -->
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav small gap-2">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contact.html">Contact</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="projects.html">Projects</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section
        id="form"
        class="bg-custom-primary d-flex flex-column justify-content-center align-items-center p-5 gap-4"
      >
        <h1 class="fw-bold text-center">ADD MY PROJECT</h1>
        <form
          id="projectForm"
          class="card border-0 shadow-sm rounded-4 p-4 col-11 col-md-8 col-lg-5"
        >
          <!-- Project Name -->
          <div class="mb-3">
            <label for="projectName" class="form-label fw-semibold">
              Project Name
            </label>
            <input
              type="text"
              class="form-control shadow-sm"
              name="projectName"
              id="projectName"
              required
            />
          </div>

          <!-- Dates -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label for="projectStartDate" class="form-label fw-semibold">
                Start Date
              </label>
              <input
                type="date"
                class="form-control shadow-sm"
                name="projectStartDate"
                id="projectStartDate"
                required
              />
            </div>
            <div class="col-md-6 mt-3 mt-md-0">
              <label for="projectEndDate" class="form-label fw-semibold">
                End Date
              </label>
              <input
                type="date"
                class="form-control shadow-sm"
                name="projectEndDate"
                id="projectEndDate"
                required
              />
            </div>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label for="projectDescription" class="form-label fw-semibold">
              Description
            </label>
            <textarea
              class="form-control shadow-sm rounded-3"
              rows="4"
              name="projectDescription"
              id="projectDescription"
              style="resize: none"
              required
            ></textarea>
          </div>

          <!-- Technologies -->
          <div class="mb-3">
            <label class="form-label d-block fw-semibold">Technologies</label>
            <div class="row g-2">
              <div class="col-6">
                <div class="form-check d-flex align-items-center gap-2">
                  <input
                    class="form-check-input shadow-sm m-0"
                    type="checkbox"
                    id="nodejs"
                    value="Node JS"
                  />
                  <label class="form-check-label text-secondary" for="nodejs">
                    Node JS
                  </label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check d-flex align-items-center gap-2">
                  <input
                    class="form-check-input shadow-sm m-0"
                    type="checkbox"
                    id="nextjs"
                    value="Next JS"
                  />
                  <label class="form-check-label text-secondary" for="nextjs">
                    Next JS
                  </label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check d-flex align-items-center gap-2">
                  <input
                    class="form-check-input shadow-sm m-0"
                    type="checkbox"
                    id="reactjs"
                    value="React JS"
                  />
                  <label class="form-check-label text-secondary" for="reactjs">
                    React JS
                  </label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check d-flex align-items-center gap-2">
                  <input
                    class="form-check-input shadow-sm m-0"
                    type="checkbox"
                    id="typescript"
                    value="Typescript"
                  />
                  <label
                    class="form-check-label text-secondary"
                    for="typescript"
                  >
                    TypeScript
                  </label>
                </div>
              </div>
            </div>
          </div>

          <!-- Upload Image -->
          <div class="mb-4">
            <label for="projectImage" class="form-label fw-semibold">
              Upload Image
            </label>
            <div class="input-group shadow-sm">
              <input
                type="file"
                class="form-control"
                name="projectImage"
                id="projectImage"
              />
            </div>
            <p class="text-muted small mt-2">
              *Upload an image in JPG or PNG format
            </p>
          </div>

          <!-- Buttons -->
          <div class="d-flex justify-content-end mt-2">
            <button
              type="submit"
              class="btn btn-dark rounded-pill px-5 shadow-sm w-100"
            >
              Submit
            </button>
          </div>
        </form>
      </section>
      <section id="projects" class="bg-white py-5">
        <div class="container">
          <!-- Section Title -->
          <div
            class="d-flex flex-column align-items-center justify-content-center mb-5"
          >
            <h2 class="fw-bold text-center">MY PROJECTS</h2>
            <div class="divider bg-black rounded"></div>
          </div>
          <!-- Search Input -->
          <div class="row mb-5 justify-content-end">
            <div class="col-12 col-md-6 col-lg-3">
              <div
                class="d-flex align-items-center border-bottom border-2 border-dark-subtle pb-1"
              >
                <i
                  class="fa-solid fa-magnifying-glass text-secondary ms-2 me-2"
                ></i>
                <input
                  type="text"
                  class="form-control border-0 shadow-none bg-transparent p-0 mb-0"
                  id="searchProject"
                  placeholder="Search..."
                />
              </div>
            </div>
          </div>

          <div id="projectContainer" class="row g-4 justify-content-start">
            <!-- Project Card Item -->
            <!-- End Project Card Item -->
          </div>
        </div>
      </section>

      <!-- Modal Body -->
      <div
        id="projectModal"
        class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 justify-content-center align-items-center"
        style="z-index: 1055"
      >
        <!-- Modal Content -->
        <div
          class="bg-white rounded-4 p-4 shadow-lg w-100 mx-3"
          style="max-width: 600px; max-height: 90vh; overflow-y: auto"
        >
          <div
            class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3"
          >
            <h3 id="modalTitle" class="fw-bold mb-0">Project Title</h3>
            <button
              id="closeModalBtn"
              class="btn-close"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <img
              id="modalImage"
              src=""
              alt="Project Image"
              class="img-fluid rounded-3 mb-3 w-100"
              style="max-height: 300px; object-fit: cover"
            />
            <p class="mb-2">
              <strong>Duration:</strong>
              <span id="modalDuration"></span>
            </p>
            <div class="mb-3">
              <strong>Technologies:</strong>
              <div
                id="modalTechnologies"
                class="d-flex align-items-center gap-2 mt-1 text-secondary"
              ></div>
            </div>
            <p
              id="modalDescription"
              class="text-secondary"
              style="white-space: pre-line"
            ></p>
          </div>
        </div>
      </div>
    </main>

    <!-- JavaScript -->
    <script src="assets/js/index.js"></script>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
